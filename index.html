<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JNFAM Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --white: #ffffff;
    --border: #e2e6ef;
    --border2: #d0d5e8;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --text: #1e2533;
    --text2: #5a6478;
    --text3: #9aa3b5;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 8px 28px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: .04em; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .logo span { color: var(--text3); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .lang-toggle { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px; gap: 2px; }
  .lang-btn { padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text3); transition: all .15s; font-family: 'IBM Plex Mono', monospace; }
  .lang-btn.active { background: var(--accent); color: #fff; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text2); transition: all .15s; font-family: 'Noto Sans KR', sans-serif; }
  .btn:hover { background: var(--bg); }
  .btn.success { background: #16a34a; border-color: #16a34a; color: #fff; }
  .btn.success:hover { background: #15803d; }
  .btn.danger { background: transparent; border-color: #fca5a5; color: #dc2626; }
  .btn.danger:hover { background: #fef2f2; }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .hero {
    background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
    border-radius: 14px; padding: 28px 32px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    color: #fff; box-shadow: 0 4px 20px rgba(37,99,235,0.25);
  }
  .hero-text h1 { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
  .hero-text p { font-size: 13px; opacity: .8; }
  .hero-stats { display: flex; gap: 28px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 600; }
  .stat-label { font-size: 11px; opacity: .7; margin-top: 2px; }

  /* 로딩 / 에러 */
  .status-box { text-align: center; padding: 56px; border-radius: 12px; background: var(--white); border: 1px solid var(--border); }
  .status-icon { font-size: 40px; margin-bottom: 12px; }
  .status-box p { font-size: 14px; color: var(--text2); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .search-bar { display: flex; align-items: center; gap: 10px; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 16px; margin-bottom: 24px; transition: border-color .15s; box-shadow: var(--shadow); }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 14px; flex: 1; font-family: 'Noto Sans KR', sans-serif; }
  .search-bar input::placeholder { color: var(--text3); }

  .cat-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .cat-tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--text2); transition: all .15s; font-family: 'Noto Sans KR', sans-serif; box-shadow: var(--shadow); }
  .cat-tab:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); }
  .section-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; }
  .section-dot { width: 9px; height: 9px; border-radius: 50%; }
  .section-count { font-size: 11px; color: var(--text3); background: var(--bg); border: 1px solid var(--border); padding: 2px 10px; border-radius: 10px; font-weight: 600; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: all .18s; text-decoration: none; display: block; position: relative; overflow: hidden; box-shadow: var(--shadow); }
  .card-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; opacity: 0; transition: opacity .15s; }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .card:hover .card-top-bar { opacity: 1; }
  .card-icon { font-size: 28px; margin-bottom: 10px; }
  .card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
  .card-desc { font-size: 11px; color: var(--text2); line-height: 1.55; margin-bottom: 12px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-type { font-size: 10px; font-family: 'IBM Plex Mono', monospace; padding: 3px 9px; border-radius: 5px; font-weight: 600; }
  .card-arrow { font-size: 14px; transition: transform .15s; }
  .card:hover .card-arrow { transform: translateX(3px); }

  .empty { text-align: center; padding: 56px; color: var(--text3); border: 2px dashed var(--border); border-radius: 12px; background: var(--white); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* 새로고침 버튼 */
  .refresh-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .refresh-info { font-size: 12px; color: var(--text3); }
  .refresh-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text2); transition: all .15s; font-family: 'Noto Sans KR', sans-serif; }
  .refresh-btn:hover { background: var(--bg); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }

  /* 구글 시트 안내 배너 */
  .sheet-banner { background: #eff4ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .sheet-banner-icon { font-size: 22px; flex-shrink: 0; }
  .sheet-banner-text { font-size: 12px; color: #1e40af; line-height: 1.6; }
  .sheet-banner-text a { color: var(--accent); font-weight: 700; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; border-radius: 10px; padding: 13px 20px; font-size: 13px; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .25s; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  #toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .hero { flex-direction: column; }
    header { padding: 0 16px; }
    .container { padding: 20px 16px; }
    .hero-stats { gap: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    JNFAM<span>/portal</span>
  </div>
  <div class="header-right">
    <span id="last-updated" style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace"></span>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <div class="hero-text">
      <h1 id="hero-title">🏢 JNFAM 팀 포털</h1>
      <p id="hero-sub">수출·수입·업무 파일과 앱을 한 곳에서 바로 접근하세요</p>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="stat-total">-</div><div class="stat-label" id="stat-lbl-total">전체 링크</div></div>
      <div class="stat"><div class="stat-num" id="stat-cats">-</div><div class="stat-label" id="stat-lbl-cats">카테고리</div></div>
    </div>
  </div>

  <!-- 구글 시트 안내 -->
  <div class="sheet-banner">
    <div class="sheet-banner-icon">📋</div>
    <div class="sheet-banner-text" id="sheet-banner-text">
      링크는 <strong>Google Sheets</strong>에서 관리해요. 시트에서 행을 추가·수정·삭제하면 아래 🔄 새로고침 버튼을 눌러 반영하세요.
    </div>
  </div>

  <div class="search-bar">
    <span style="font-size:16px;color:var(--text3)">🔍</span>
    <input type="text" id="search-input" placeholder="파일명, 앱 이름으로 검색..." oninput="renderPortal()">
  </div>

  <div class="refresh-bar">
    <div class="cat-tabs" id="cat-tabs" style="margin-bottom:0;flex:1"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadFromSheets(true)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      <span id="refresh-label">새로고침</span>
    </button>
  </div>

  <div id="portal-content">
    <div class="status-box">
      <div class="spinner"></div>
      <p id="loading-text">Google Sheets에서 데이터를 불러오는 중...</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycby_lfM8QKjkm2x4Tf9DTkyNeakbVFG4vnessClTKt57SVKMI0CmLCWSF_vyDHVgPn15/exec';

// 카테고리 색상 자동 배정
const CAT_COLORS = ['#2563eb','#16a34a','#7c3aed','#ea580c','#dc2626','#0891b2','#d97706','#be185d'];
const COLOR_LIGHT = {'#2563eb':'#eff4ff','#16a34a':'#f0fdf4','#7c3aed':'#f5f3ff','#ea580c':'#fff7ed','#dc2626':'#fef2f2','#0891b2':'#ecfeff','#d97706':'#fffbeb','#be185d':'#fdf2f8'};
function lightOf(c){ return COLOR_LIGHT[c]||'#f5f6fa'; }

// ── 다국어 ────────────────────────────────────
const LANG = {
  ko: {
    heroTitle:'JNFAM 팀 포털',
    heroSub:'수출·수입·업무 파일과 앱을 한 곳에서 바로 접근하세요',
    statLinks:'전체 링크', statCats:'카테고리',
    searchPh:'파일명, 앱 이름으로 검색...',
    filterAll:'전체', updLbl:'업데이트',
    refresh:'새로고침', loading:'Google Sheets에서 데이터를 불러오는 중...',
    loadErr:'데이터를 불러오지 못했어요. 새로고침을 눌러주세요.',
    emptyQ: q=>`"${q}" 검색 결과가 없습니다`,
    emptyAll:'Google Sheets에 데이터를 추가해 주세요.',
    toastRefreshed:'✅ 최신 데이터로 업데이트됐어요',
    toastErr:'❌ 불러오기 실패. 잠시 후 다시 시도해주세요.',
    bannerText:'링크는 <strong>Google Sheets</strong>에서 관리해요. 시트에서 행을 추가·수정·삭제하면 아래 🔄 새로고침 버튼을 눌러 반영하세요.',
  },
  en: {
    heroTitle:'JNFAM Team Portal',
    heroSub:'Quick access to all export, import & work files in one place',
    statLinks:'Total Links', statCats:'Categories',
    searchPh:'Search by file or app name...',
    filterAll:'All', updLbl:'Updated',
    refresh:'Refresh', loading:'Loading from Google Sheets...',
    loadErr:'Failed to load data. Please click Refresh.',
    emptyQ: q=>`No results for "${q}"`,
    emptyAll:'Please add data to Google Sheets.',
    toastRefreshed:'✅ Data refreshed successfully',
    toastErr:'❌ Load failed. Please try again.',
    bannerText:'Links are managed via <strong>Google Sheets</strong>. After adding or editing rows in the sheet, click 🔄 Refresh below.',
  }
};

let lang = localStorage.getItem('jnfam_lang') || 'ko';
let allLinks = [];
let categories = [];
let catColorMap = {};
let activeFilter = 'all';

function T(k,a){ const v=LANG[lang][k]; return typeof v==='function'?v(a):(v||k); }

function setLang(l) {
  lang = l;
  localStorage.setItem('jnfam_lang', l);
  document.getElementById('btn-ko').classList.toggle('active', l==='ko');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  applyLang();
  renderPortal();
}

function applyLang() {
  document.getElementById('hero-title').textContent = '🏢 ' + T('heroTitle');
  document.getElementById('hero-sub').textContent = T('heroSub');
  document.getElementById('stat-lbl-total').textContent = T('statLinks');
  document.getElementById('stat-lbl-cats').textContent = T('statCats');
  document.getElementById('search-input').placeholder = T('searchPh');
  document.getElementById('refresh-label').textContent = T('refresh');
  document.getElementById('sheet-banner-text').innerHTML = T('bannerText');
  updateLastUpdated();
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  const t = localStorage.getItem('jnfam_last_updated');
  if(t) {
    const d = new Date(t);
    el.textContent = `${T('updLbl')}: ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
}

// ── Google Sheets 데이터 로드 ─────────────────
async function loadFromSheets(showToast=false) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('refresh-label').textContent = '...';

  // 캐시된 데이터 먼저 표시
  const cached = localStorage.getItem('jnfam_links');
  if(cached && !showToast) {
    try {
      processData(JSON.parse(cached));
    } catch(e) {}
  }

  try {
    const res = await fetch(SHEETS_URL + '?t=' + Date.now());
    const data = await res.json();
    localStorage.setItem('jnfam_links', JSON.stringify(data));
    localStorage.setItem('jnfam_last_updated', new Date().toISOString());
    processData(data);
    if(showToast) toast(T('toastRefreshed'));
  } catch(e) {
    if(showToast) toast(T('toastErr'));
    // 캐시 없으면 에러 표시
    if(!cached) {
      document.getElementById('portal-content').innerHTML = `
        <div class="status-box">
          <div class="status-icon">⚠️</div>
          <p>${T('loadErr')}</p>
        </div>`;
    }
  }

  btn.classList.remove('spinning');
  document.getElementById('refresh-label').textContent = T('refresh');
  updateLastUpdated();
}

function processData(data) {
  // 카테고리 목록 추출 및 색상 배정
  const catSet = [...new Set(data.map(r => r.category).filter(Boolean))];
  catSet.forEach((c, i) => {
    if(!catColorMap[c]) catColorMap[c] = CAT_COLORS[i % CAT_COLORS.length];
  });
  categories = catSet;
  allLinks = data.filter(r => r.nameKo || r.name);
  renderPortal();
}

// ── 포털 렌더링 ───────────────────────────────
function renderPortal() {
  const q = document.getElementById('search-input').value.toLowerCase();

  // 통계
  document.getElementById('stat-total').textContent = allLinks.length;
  document.getElementById('stat-cats').textContent = categories.length;

  // 카테고리 탭
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = `<button class="cat-tab ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">${T('filterAll')} ${allLinks.length}</button>`;
  categories.forEach(cat => {
    const n = allLinks.filter(l=>l.category===cat).length;
    const color = catColorMap[cat]||'#2563eb';
    const isActive = activeFilter===cat;
    tabs.innerHTML += `<button class="cat-tab ${isActive?'active':''}" style="${isActive?`background:${color};border-color:${color};color:#fff`:''}" onclick="setFilter('${cat}')">${getCatIcon(cat)} ${cat} ${n}</button>`;
  });

  // 카드 콘텐츠
  const catsShow = activeFilter==='all' ? categories : [activeFilter];
  let html = '', hasAny = false;

  catsShow.forEach(cat => {
    let links = allLinks.filter(l=>l.category===cat);
    if(q) links = links.filter(l=>(getName(l)+getDesc(l)).toLowerCase().includes(q));
    if(!links.length) return;
    hasAny = true;
    const color = catColorMap[cat]||'#2563eb';
    html += `<div class="section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-dot" style="background:${color}"></div>
          ${getCatIcon(cat)} ${cat}
        </div>
        <span class="section-count">${links.length}</span>
      </div>
      <div class="cards">`;
    links.forEach(l => {
      const bg = lightOf(color);
      const name = getName(l);
      const desc = getDesc(l);
      html += `<a class="card" href="${l.url||'#'}" target="_blank" rel="noopener">
        <div class="card-top-bar" style="background:${color}"></div>
        <div class="card-icon">${l.icon||'📄'}</div>
        <div class="card-name">${name}</div>
        ${desc?`<div class="card-desc">${desc}</div>`:''}
        <div class="card-footer">
          <span class="card-type" style="background:${bg};color:${color}">${l.type||cat}</span>
          <span class="card-arrow" style="color:${color}">→</span>
        </div>
      </a>`;
    });
    html += `</div></div>`;
  });

  if(!hasAny && allLinks.length > 0) {
    html = `<div class="empty"><div class="empty-icon">🔍</div><p>${T('emptyQ',q)}</p></div>`;
  } else if(!hasAny) {
    html = `<div class="empty"><div class="empty-icon">📋</div><p>${T('emptyAll')}</p></div>`;
  }

  document.getElementById('portal-content').innerHTML = html;

  // hover 효과
  document.querySelectorAll('.card').forEach(card => {
    const bar = card.querySelector('.card-top-bar');
    if(bar){
      card.addEventListener('mouseenter',()=>bar.style.opacity='1');
      card.addEventListener('mouseleave',()=>bar.style.opacity='0');
    }
  });
}

function getName(l) {
  return (lang==='ko' ? (l.nameKo||l.name) : (l.nameEn||l.nameKo||l.name)) || '';
}
function getDesc(l) {
  return (lang==='ko' ? (l.descKo||l.desc) : (l.descEn||l.descKo||l.desc)) || '';
}

// 카테고리 아이콘 자동 배정
const CAT_ICONS = {'수출':'🚢','export':'🚢','수입':'📦','import':'📦','웹앱':'🌐','webapp':'🌐','web apps':'🌐','인사':'👥','hr':'👥','총무':'👥','일반':'📁','general':'📁','finance':'💰','재무':'💰'};
function getCatIcon(cat) {
  return CAT_ICONS[cat.toLowerCase()] || '📂';
}

function setFilter(id){ activeFilter=id; renderPortal(); }

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── 초기화 ────────────────────────────────────
document.getElementById('btn-ko').classList.toggle('active', lang==='ko');
document.getElementById('btn-en').classList.toggle('active', lang==='en');
applyLang();
loadFromSheets();
</script>
</body>
</html>
